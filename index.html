<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAELSTROM | Survive the Sea</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #0d4a3e; font-family: 'Roboto', sans-serif; touch-action: none; }
        canvas { display: block; }
        .pirate-font { font-family: 'Pirata+One', cursive; }
        
        #ui-layer { pointer-events: none; }
        #ui-layer * { pointer-events: auto; }
        
        .card-gradient {
            background: linear-gradient(135deg, rgba(26, 111, 168, 0.9) 0%, rgba(13, 74, 62, 0.9) 100%);
            border: 2px solid #e8c97d;
        }

        /* Virtual Joystick */
        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: none;
            touch-action: none;
        }
        #joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(232, 201, 125, 0.5);
            border-radius: 50%;
            left: 35px;
            top: 35px;
        }

        @media (pointer: coarse) {
            #joystick-container { display: block; }
        }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900 text-white">
        <h1 class="pirate-font text-6xl mb-4 text-yellow-500">MAELSTROM</h1>
        <div class="w-64 h-2 bg-gray-700 rounded-full overflow-hidden">
            <div id="loading-bar" class="h-full bg-yellow-500 w-0 transition-all duration-300"></div>
        </div>
        <p id="loading-text" class="mt-4 text-gray-400">Preparing the fleet...</p>
    </div>

    <!-- HUD -->
    <div id="ui-layer" class="fixed inset-0 z-10 hidden">
        <!-- Top Bar -->
        <div class="flex justify-between p-4">
            <div class="flex flex-col gap-1">
                <div class="flex items-center gap-2">
                    <span class="text-yellow-500 font-bold">HP</span>
                    <div class="w-48 h-4 bg-gray-800 rounded-full border border-gray-600">
                        <div id="hp-bar" class="h-full bg-red-600 rounded-full transition-all" style="width: 100%"></div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-blue-400 font-bold">XP</span>
                    <div class="w-48 h-2 bg-gray-800 rounded-full border border-gray-600">
                        <div id="xp-bar" class="h-full bg-blue-500 rounded-full transition-all" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="text-center">
                <div id="game-timer" class="pirate-font text-4xl text-white">00:00</div>
                <div class="text-yellow-500 text-sm">SURVIVE</div>
            </div>
            <div class="text-right">
                <div id="doubloon-count" class="pirate-font text-3xl text-yellow-400">0</div>
                <div class="text-gray-400 text-xs">DOUBLOONS</div>
            </div>
        </div>

        <!-- Level Up Overlay -->
        <div id="level-up-screen" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden">
            <div class="text-center">
                <h2 class="pirate-font text-5xl text-yellow-500 mb-8">CHOOSE AN UPGRADE</h2>
                <div id="upgrade-cards" class="flex flex-wrap justify-center gap-6 p-4">
                    <!-- Cards injected here -->
                </div>
            </div>
        </div>

        <!-- Death Screen -->
        <div id="death-screen" class="fixed inset-0 bg-black/90 flex flex-col items-center justify-center hidden">
            <h1 class="pirate-font text-7xl text-red-600 mb-2">WRECKED</h1>
            <p class="text-gray-400 mb-8 italic">"The sea claims another legend..."</p>
            <div class="bg-slate-800 p-6 rounded-lg border border-yellow-900 w-80 text-center mb-8">
                <div class="text-2xl text-white mb-2">Time: <span id="final-time" class="text-yellow-500">00:00</span></div>
                <div class="text-2xl text-white">Score: <span id="final-score" class="text-yellow-500">0</span></div>
            </div>
            <button onclick="location.reload()" class="bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-3 px-8 rounded-full pirate-font text-2xl transition-transform active:scale-95">
                SAIL AGAIN
            </button>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="main-menu" class="fixed inset-0 z-20 flex flex-col items-center justify-center bg-transparent">
        <h1 class="pirate-font text-9xl text-yellow-500 drop-shadow-2xl mb-2">MAELSTROM</h1>
        <p class="text-white text-xl tracking-widest mb-12 opacity-80">SURVIVE THE SEA. OUTLAST THE STORM.</p>
        <button id="start-btn" class="bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-4 px-12 rounded-full pirate-font text-4xl transition-all hover:scale-110 active:scale-95 shadow-2xl">
            COMMENCE VOYAGE
        </button>
        <div class="mt-12 flex gap-8">
            <div class="text-center text-white/50"><span class="block text-white font-bold">WASD</span> to steer</div>
            <div class="text-center text-white/50"><span class="block text-white font-bold">AUTO</span> cannons</div>
            <div class="text-center text-white/50"><span class="block text-white font-bold">LEVEL UP</span> to grow</div>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <script>
        /**
         * MAELSTROM - Game Engine
         * Built for Three.js
         */

        const CONFIG = {
            oceanColor: 0x1a6fa8,
            fogColor: 0x0d4a3e,
            playerSpeed: 0.15,
            playerTurnSpeed: 0.04,
            drag: 0.98,
            spawnDistance: 60,
            weaponRange: 25,
            fireRate: 1500,
            assetPath: './Models/'
        };

        const state = {
            running: false,
            paused: false,
            time: 0,
            score: 0,
            doubloons: 0,
            level: 1,
            xp: 0,
            xpToNext: 100,
            hp: 100,
            maxHp: 100,
            fleetSize: 1,
            damageMultiplier: 1,
            assets: {},
            keys: {},
            joystick: { active: false, x: 0, y: 0 }
        };

        // --- Core Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(CONFIG.fogColor, 0.015);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sun = new THREE.DirectionalLight(0xffeec2, 1.2);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        sun.shadow.camera.left = -100;
        sun.shadow.camera.right = 100;
        sun.shadow.camera.top = 100;
        sun.shadow.camera.bottom = -100;
        scene.add(sun);

        // --- Asset Management ---
        const loader = new THREE.GLTFLoader();
        const modelsToLoad = [
            'ship-pirate-small.glb',
            'ship-small.glb',
            'ship-medium.glb',
            'ship-large.glb',
            'ship-ghost.glb',
            'boat-row-small.glb',
            'cannon-ball.glb',
            'chest.glb',
            'rocks-a.glb'
        ];

        async function loadAssets() {
            const loadingBar = document.getElementById('loading-bar');
            const loadingText = document.getElementById('loading-text');
            let loaded = 0;

            const promises = modelsToLoad.map(file => {
                return new Promise((resolve) => {
                    loader.load(CONFIG.assetPath + file, 
                        (gltf) => {
                            state.assets[file] = gltf.scene;
                            loaded++;
                            const progress = (loaded / modelsToLoad.length) * 100;
                            loadingBar.style.width = progress + '%';
                            loadingText.innerText = `Hauling ${file}...`;
                            
                            // Setup shadows for all children
                            gltf.scene.traverse(child => {
                                if (child.isMesh) {
                                    child.castShadow = true;
                                    child.receiveShadow = true;
                                }
                            });
                            resolve();
                        },
                        undefined,
                        () => {
                            console.warn(`Failed to load ${file}, using fallback`);
                            // Fallback cube
                            const fallback = new THREE.Group();
                            const mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color: 0xff00ff}));
                            fallback.add(mesh);
                            state.assets[file] = fallback;
                            loaded++;
                            resolve();
                        }
                    );
                });
            });

            await Promise.all(promises);
            document.getElementById('loading-screen').classList.add('opacity-0');
            setTimeout(() => document.getElementById('loading-screen').remove(), 500);
        }

        // --- Entities ---
        class Projectile {
            constructor(pos, dir, isPlayer = true) {
                this.mesh = state.assets['cannon-ball.glb'].clone();
                this.mesh.position.copy(pos);
                this.mesh.scale.set(0.5, 0.5, 0.5);
                this.velocity = dir.multiplyScalar(0.8);
                this.isPlayer = isPlayer;
                this.life = 100;
                scene.add(this.mesh);
            }
            update() {
                this.mesh.position.add(this.velocity);
                this.life--;
                if (this.life <= 0) this.destroy();
            }
            destroy() {
                scene.remove(this.mesh);
                projectiles = projectiles.filter(p => p !== this);
            }
        }

        class Enemy {
            constructor(type = 'ship-small.glb') {
                this.mesh = state.assets[type].clone();
                const angle = Math.random() * Math.PI * 2;
                this.mesh.position.set(
                    player.mesh.position.x + Math.cos(angle) * CONFIG.spawnDistance,
                    0,
                    player.mesh.position.z + Math.sin(angle) * CONFIG.spawnDistance
                );
                this.hp = type === 'ship-medium.glb' ? 60 : 30;
                this.speed = 0.08 + Math.random() * 0.04;
                scene.add(this.mesh);
            }
            update() {
                const dir = new THREE.Vector3().subVectors(player.mesh.position, this.mesh.position).normalize();
                this.mesh.lookAt(player.mesh.position);
                this.mesh.position.add(dir.multiplyScalar(this.speed));

                // Simple collision with player
                if (this.mesh.position.distanceTo(player.mesh.position) < 3) {
                    takeDamage(10);
                    this.die(false);
                }
            }
            die(dropLoot = true) {
                if (dropLoot) spawnDoubloon(this.mesh.position);
                scene.remove(this.mesh);
                enemies = enemies.filter(e => e !== this);
                state.score += 100;
            }
        }

        class Doubloon {
            constructor(pos) {
                this.mesh = state.assets['chest.glb'].clone();
                this.mesh.position.copy(pos);
                this.mesh.scale.set(0.5, 0.5, 0.5);
                scene.add(this.mesh);
            }
            update() {
                this.mesh.rotation.y += 0.02;
                if (this.mesh.position.distanceTo(player.mesh.position) < 4) {
                    collectXP(20);
                    state.doubloons += 10;
                    document.getElementById('doubloon-count').innerText = state.doubloons;
                    scene.remove(this.mesh);
                    pickups = pickups.filter(p => p !== this);
                }
            }
        }

        // --- World Objects ---
        const oceanGeom = new THREE.PlaneGeometry(1000, 1000, 100, 100);
        oceanGeom.rotateX(-Math.PI / 2);
        const oceanMat = new THREE.MeshStandardMaterial({
            color: CONFIG.oceanColor,
            roughness: 0.1,
            metalness: 0.2,
            transparent: true,
            opacity: 0.9
        });
        const ocean = new THREE.Mesh(oceanGeom, oceanMat);
        scene.add(ocean);

        const player = {
            mesh: null,
            velocity: new THREE.Vector3(),
            rotationVel: 0,
            fireTimer: 0,
            init() {
                this.mesh = state.assets['ship-pirate-small.glb'].clone();
                scene.add(this.mesh);
            },
            update() {
                // Movement
                let forward = 0;
                if (state.keys['KeyW'] || state.keys['ArrowUp'] || state.joystick.y < -0.2) forward = 1;
                
                let turn = 0;
                if (state.keys['KeyA'] || state.keys['ArrowLeft'] || state.joystick.x < -0.2) turn = 1;
                if (state.keys['KeyD'] || state.keys['ArrowRight'] || state.joystick.x > 0.2) turn = -1;

                this.rotationVel += turn * CONFIG.playerTurnSpeed;
                this.mesh.rotation.y += this.rotationVel;
                this.rotationVel *= 0.8;

                const moveDir = new THREE.Vector3(0, 0, 1).applyQuaternion(this.mesh.quaternion);
                if (forward) {
                    this.velocity.add(moveDir.multiplyScalar(CONFIG.playerSpeed));
                }
                this.mesh.position.add(this.velocity);
                this.velocity.multiplyScalar(CONFIG.drag);

                // Auto combat
                this.fireTimer += 16.6; // approx 60fps
                if (this.fireTimer > CONFIG.fireRate) {
                    this.autoFire();
                    this.fireTimer = 0;
                }
                
                // Rock/Wobble effect
                this.mesh.rotation.z = Math.sin(Date.now() * 0.002) * 0.05;
                this.mesh.rotation.x = Math.cos(Date.now() * 0.001) * 0.02;
            },
            autoFire() {
                // Find nearest enemy
                let nearest = null;
                let minDist = CONFIG.weaponRange;
                enemies.forEach(e => {
                    const d = e.mesh.position.distanceTo(this.mesh.position);
                    if (d < minDist) {
                        minDist = d;
                        nearest = e;
                    }
                });

                if (nearest) {
                    const dir = new THREE.Vector3().subVectors(nearest.mesh.position, this.mesh.position).normalize();
                    projectiles.push(new Projectile(this.mesh.position.clone().add(new THREE.Vector3(0,1,0)), dir));
                }
            }
        };

        // --- Game Logic ---
        let enemies = [];
        let projectiles = [];
        let pickups = [];
        let spawnTimer = 0;

        function takeDamage(amount) {
            state.hp -= amount;
            document.getElementById('hp-bar').style.width = `${(state.hp / state.maxHp) * 100}%`;
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 500);
            if (state.hp <= 0) endGame();
        }

        function collectXP(amount) {
            state.xp += amount;
            if (state.xp >= state.xpToNext) {
                levelUp();
            }
            document.getElementById('xp-bar').style.width = `${(state.xp / state.xpToNext) * 100}%`;
        }

        function levelUp() {
            state.level++;
            state.xp = 0;
            state.xpToNext *= 1.2;
            state.paused = true;
            showUpgradeScreen();
        }

        const UPGRADES = [
            { name: "Extra Cannon", desc: "Increase fire rate by 20%", effect: () => CONFIG.fireRate *= 0.8 },
            { name: "Reinforced Hull", desc: "Heal 50% HP and increase Max HP", effect: () => { state.maxHp += 20; state.hp = Math.min(state.maxHp, state.hp + (state.maxHp * 0.5)); } },
            { name: "Swift Sails", desc: "Increase movement speed", effect: () => CONFIG.playerSpeed += 0.05 },
            { name: "Heavy Shot", desc: "Increase weapon range", effect: () => CONFIG.weaponRange += 5 },
            { name: "Bounty Hunter", desc: "Double XP from Doubloons", effect: () => state.damageMultiplier *= 1.1 }
        ];

        function showUpgradeScreen() {
            const screen = document.getElementById('level-up-screen');
            const container = document.getElementById('upgrade-cards');
            container.innerHTML = '';
            
            // Pick 3 random
            const shuffled = [...UPGRADES].sort(() => 0.5 - Math.random()).slice(0, 3);
            
            shuffled.forEach(up => {
                const card = document.createElement('div');
                card.className = "card-gradient w-64 p-6 rounded-xl cursor-pointer hover:scale-105 transition-transform text-white text-center";
                card.innerHTML = `
                    <h3 class="pirate-font text-3xl mb-2 text-yellow-400">${up.name}</h3>
                    <p class="text-sm opacity-80">${up.desc}</p>
                `;
                card.onclick = () => {
                    up.effect();
                    state.paused = false;
                    screen.classList.add('hidden');
                    updateHUD();
                };
                container.appendChild(card);
            });
            
            screen.classList.remove('hidden');
        }

        function spawnDoubloon(pos) {
            pickups.push(new Doubloon(pos.clone()));
        }

        function updateHUD() {
            document.getElementById('hp-bar').style.width = `${(state.hp / state.maxHp) * 100}%`;
            const mins = Math.floor(state.time / 60);
            const secs = Math.floor(state.time % 60);
            document.getElementById('game-timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function endGame() {
            state.running = false;
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('death-screen').classList.remove('hidden');
            document.getElementById('final-time').innerText = document.getElementById('game-timer').innerText;
            document.getElementById('final-score').innerText = state.score;
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            if (!state.running || state.paused) {
                // Still render but don't update logic
                renderer.render(scene, camera);
                return;
            }

            // Logic
            state.time += 1/60;
            updateHUD();

            player.update();
            camera.position.lerp(new THREE.Vector3(player.mesh.position.x, 40, player.mesh.position.z + 40), 0.05);
            camera.lookAt(player.mesh.position);

            // Spawning
            spawnTimer += 1;
            if (spawnTimer > 120) { // Every 2 seconds
                enemies.push(new Enemy(Math.random() > 0.8 ? 'ship-medium.glb' : 'ship-small.glb'));
                spawnTimer = 0;
            }

            enemies.forEach(e => e.update());
            projectiles.forEach(p => {
                p.update();
                // Collision check
                enemies.forEach(e => {
                    if (p.mesh.position.distanceTo(e.mesh.position) < 3) {
                        e.hp -= 20;
                        if (e.hp <= 0) e.die();
                        p.destroy();
                    }
                });
            });
            pickups.forEach(p => p.update());

            // Ocean movement
            const time = Date.now() * 0.001;
            const pos = ocean.geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const z = pos.getZ(i);
                // Simple wave math
                const y = Math.sin(x * 0.1 + time) * 0.5 + Math.cos(z * 0.1 + time) * 0.5;
                pos.setY(i, y);
            }
            pos.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // --- Input Handling ---
        window.addEventListener('keydown', e => state.keys[e.code] = true);
        window.addEventListener('keyup', e => state.keys[e.code] = false);

        // Joystick Handling
        const jContainer = document.getElementById('joystick-container');
        const jKnob = document.getElementById('joystick-knob');
        let startX, startY;

        jContainer.addEventListener('touchstart', e => {
            state.joystick.active = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', e => {
            if (!state.joystick.active) return;
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            
            const lx = Math.cos(angle) * dist;
            const ly = Math.sin(angle) * dist;
            
            jKnob.style.transform = `translate(${lx}px, ${ly}px)`;
            state.joystick.x = lx / 40;
            state.joystick.y = ly / 40;
        });

        window.addEventListener('touchend', () => {
            state.joystick.active = false;
            state.joystick.x = 0;
            state.joystick.y = 0;
            jKnob.style.transform = `translate(0px, 0px)`;
        });

        // --- Start Game ---
        document.getElementById('start-btn').onclick = () => {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            state.running = true;
        };

        window.onload = async () => {
            await loadAssets();
            player.init();
            animate();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
