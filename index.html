<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAELSTROM - Pirate Naval Survivor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');

        :root {
            --bg-color: #0b1a2a;
            --gold: #f1c40f;
            --gold-dark: #b8860b;
            --text-light: #ecf0f1;
            --danger: #e74c3c;
            --ocean: #1a6fa8;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'MedievalSharp', cursive, sans-serif;
            user-select: none;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through unless on a button */
        }

        .screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(11, 26, 42, 0.85);
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
            pointer-events: auto;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        h1 {
            color: var(--gold);
            font-size: 5rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
            margin: 0 0 10px 0;
            text-align: center;
            letter-spacing: 5px;
        }

        h2 {
            color: var(--text-light);
            font-size: 2rem;
            margin: 0 0 30px 0;
        }

        button {
            background: linear-gradient(to bottom, var(--gold), var(--gold-dark));
            border: 2px solid #fff;
            color: #111;
            font-family: 'MedievalSharp', cursive;
            font-size: 1.8rem;
            padding: 15px 40px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, filter 0.1s;
        }

        button:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        button:active {
            transform: scale(0.95);
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #hud.active { opacity: 1; }

        .hud-top {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .bar-container {
            width: 250px;
            background: rgba(0,0,0,0.6);
            border: 2px solid var(--gold);
            height: 25px;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            background: #2ecc71;
            transition: width 0.2s;
        }

        #xp-fill { background: var(--gold); width: 0%; }
        
        .bar-text {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 1rem; text-shadow: 1px 1px 2px #000;
        }

        #timer {
            font-size: 2.5rem;
            color: var(--text-light);
            text-shadow: 0 2px 5px #000;
            font-weight: bold;
        }

        /* Upgrade Cards */
        #upgrade-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            width: 220px;
            height: 320px;
            background: rgba(15, 30, 50, 0.95);
            border: 3px solid var(--gold);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.7);
            transition: transform 0.2s;
            text-align: center;
        }

        .card:hover { transform: translateY(-10px); background: rgba(20, 40, 70, 0.95); }
        .card h3 { color: var(--gold); font-size: 1.5rem; margin: 10px 0; }
        .card p { color: var(--text-light); font-size: 1.1rem; line-height: 1.4; }
        .card-icon { font-size: 4rem; margin-bottom: 10px; }

        /* Floating Damage Text */
        .dmg-text {
            position: absolute;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            pointer-events: none;
            user-select: none;
            transform: translate(-50%, -50%);
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1.5); }
        }

        #loading-text {
            color: var(--gold);
            font-size: 2rem;
            margin-top: 20px;
        }
    </style>
    
    <!-- ES Module Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- 3D Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- UI Overlay -->
    <div id="ui-layer">
        
        <!-- Loading Screen -->
        <div id="screen-loading" class="screen active">
            <h1>MAELSTROM</h1>
            <h2>Survive the Sea. Outlast the Storm.</h2>
            <div id="loading-text">Loading Fleet: 0%</div>
        </div>

        <!-- Main Menu -->
        <div id="screen-menu" class="screen">
            <h1>MAELSTROM</h1>
            <h2>Only the strong rule the deep.</h2>
            <button id="btn-play">SET SAIL</button>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div class="hud-top">
                <div>
                    <div class="bar-container" style="margin-bottom: 10px;">
                        <div id="hp-fill" class="bar-fill"></div>
                        <div class="bar-text" id="hp-text">HP: 100 / 100</div>
                    </div>
                    <div style="color: var(--gold); font-size: 1.5rem; text-shadow: 1px 1px 2px #000;">
                        SCORE: <span id="score-text">0</span>
                    </div>
                </div>
                <div id="timer">00:00</div>
                <div>
                    <div class="bar-container">
                        <div id="xp-fill" class="bar-fill"></div>
                        <div class="bar-text" id="xp-text">LVL 1 (0/100)</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Level Up Screen -->
        <div id="screen-levelup" class="screen">
            <h1 style="font-size: 4rem;">LEVEL UP!</h1>
            <h2>Choose Your Upgrade</h2>
            <div id="upgrade-container">
                <!-- Cards injected by JS -->
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="screen-gameover" class="screen">
            <h1 style="color: var(--danger);">THE SEA CLAIMS YOU</h1>
            <h2 id="final-stats">Survived: 00:00 | Score: 0</h2>
            <button id="btn-restart">SAIL AGAIN</button>
        </div>
    </div>

    <!-- Main Game Script -->
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- GAME CONFIG & STATE ---
        const STATE = {
            LOADING: 0,
            MENU: 1,
            PLAYING: 2,
            PAUSED: 3,
            GAMEOVER: 4
        };
        let currentState = STATE.LOADING;

        const GAME = {
            time: 0,
            lastFrameTime: 0,
            score: 0,
            level: 1,
            xp: 0,
            nextXp: 100,
            enemySpawnTimer: 0,
            enemySpawnRate: 2.0, // spawns per second
            difficultyMultiplier: 1.0,
            models: {}
        };

        const PLAYER = {
            mesh: null,
            hp: 100,
            maxHp: 100,
            speed: 15,
            turnSpeed: 2.5,
            fireRate: 1.0, // seconds
            fireTimer: 0,
            damage: 25,
            cannons: 1,
            pickupRadius: 15
        };

        // Entities arrays
        let enemies = [];
        let projectiles = [];
        let loots = [];
        let particles =[];
        let floatingTexts =[];

        // Input state
        const keys = { w:false, a:false, s:false, d:false, ArrowUp:false, ArrowLeft:false, ArrowDown:false, ArrowRight:false };

        // --- THREE.JS SETUP ---
        const canvas = document.getElementById('game-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b1a2a);
        scene.fog = new THREE.FogExp2(0x0b1a2a, 0.015);

        // Isometric Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 500);
        const cameraOffset = new THREE.Vector3(0, 40, 40); // Top-down angled
        camera.position.copy(cameraOffset);
        camera.lookAt(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeeb1, 1.2);
        dirLight.position.set(50, 100, 20);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -100;
        dirLight.shadow.camera.right = 100;
        dirLight.shadow.camera.top = 100;
        dirLight.shadow.camera.bottom = -100;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // Ocean Base (Low Poly procedural plane)
        const oceanGeo = new THREE.PlaneGeometry(300, 300, 60, 60);
        oceanGeo.rotateX(-Math.PI / 2);
        // Save original vertices for wave animation
        const posAttr = oceanGeo.attributes.position;
        const origZ = new Float32Array(posAttr.count);
        for(let i=0; i<posAttr.count; i++) origZ[i] = posAttr.getY(i);
        oceanGeo.userData.origZ = origZ;

        const oceanMat = new THREE.MeshStandardMaterial({
            color: 0x1a6fa8,
            flatShading: true,
            roughness: 0.1,
            metalness: 0.2
        });
        const ocean = new THREE.Mesh(oceanGeo, oceanMat);
        ocean.receiveShadow = true;
        scene.add(ocean);

        // --- ASSET LOADING WITH FALLBACKS ---
        const assetsToLoad = {
            player: 'Models/ship-pirate-small.glb',
            enemySmall: 'Models/boat-row-small.glb',
            enemyMed: 'Models/ship-small.glb',
            cannonball: 'Models/cannon-ball.glb',
            chest: 'Models/chest.glb'
        };

        // Failsafe primitive generators if GitHub repo misses a file or typo
        function createFallbackMesh(type) {
            const group = new THREE.Group();
            let geo, mat;
            if(type === 'player') {
                geo = new THREE.BoxGeometry(3, 2, 6);
                mat = new THREE.MeshStandardMaterial({color: 0x8b4513});
            } else if(type.includes('enemy')) {
                geo = new THREE.ConeGeometry(1.5, 4, 4);
                geo.rotateX(Math.PI/2);
                mat = new THREE.MeshStandardMaterial({color: 0xaa3333});
            } else if(type === 'cannonball') {
                geo = new THREE.SphereGeometry(0.4, 8, 8);
                mat = new THREE.MeshStandardMaterial({color: 0x222222});
            } else if(type === 'chest') {
                geo = new THREE.BoxGeometry(1, 1, 1);
                mat = new THREE.MeshStandardMaterial({color: 0xffd700});
            }
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            group.add(mesh);
            return group;
        }

        async function initAssets() {
            const loader = new GLTFLoader();
            const keys = Object.keys(assetsToLoad);
            let loadedCount = 0;
            const loadingText = document.getElementById('loading-text');

            for (const key of keys) {
                try {
                    const gltf = await loader.loadAsync(assetsToLoad[key]);
                    // Enable shadows
                    gltf.scene.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    
                    // Normalize scale to prevent giant models
                    const box = new THREE.Box3().setFromObject(gltf.scene);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const targetSize = key === 'chest' ? 1.5 : (key === 'cannonball' ? 0.8 : 5.0);
                    gltf.scene.scale.setScalar(targetSize / maxDim);
                    
                    GAME.models[key] = gltf.scene;
                } catch (e) {
                    console.warn(`[MAELSTROM] Failed to load ${assetsToLoad[key]}. Using fallback primitive.`);
                    GAME.models[key] = createFallbackMesh(key);
                }
                loadedCount++;
                loadingText.innerText = `Loading Fleet: ${Math.floor((loadedCount / keys.length) * 100)}%`;
            }

            // Setup Player
            PLAYER.mesh = GAME.models.player.clone();
            scene.add(PLAYER.mesh);
            
            setTimeout(() => {
                switchScreen('screen-menu');
                currentState = STATE.MENU;
            }, 500); // slight delay for smooth transition
        }

        // --- CORE SYSTEMS ---

        function spawnEnemy() {
            // Spawn in a circle outside camera view
            const angle = Math.random() * Math.PI * 2;
            const radius = 60; 
            const spawnX = PLAYER.mesh.position.x + Math.cos(angle) * radius;
            const spawnZ = PLAYER.mesh.position.z + Math.sin(angle) * radius;

            // Determine type based on game time (difficulty)
            const isMedium = Math.random() < (GAME.difficultyMultiplier - 1.0) * 0.2;
            const type = isMedium ? 'enemyMed' : 'enemySmall';
            
            const mesh = GAME.models[type].clone();
            mesh.position.set(spawnX, 0, spawnZ);
            scene.add(mesh);

            enemies.push({
                mesh: mesh,
                hp: isMedium ? 60 : 30,
                maxHp: isMedium ? 60 : 30,
                speed: isMedium ? 8 : 12,
                damage: isMedium ? 15 : 5,
                type: type,
                yOffset: 0,
                yPhase: Math.random() * Math.PI * 2 // for bobbing
            });
        }

        function spawnLoot(x, z, value) {
            const mesh = GAME.models.chest.clone();
            mesh.position.set(x, 1, z);
            scene.add(mesh);
            loots.push({ mesh, value, timer: 0 });
        }

        function createExplosion(x, z, color) {
            const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const mat = new THREE.MeshBasicMaterial({ color: color });
            for(let i=0; i<8; i++) {
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, 1, z);
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 15,
                    (Math.random()) * 15,
                    (Math.random() - 0.5) * 15
                );
                scene.add(mesh);
                particles.push({ mesh, velocity, life: 1.0 });
            }
        }

        function createWakeParticle(x, z) {
            const geo = new THREE.BoxGeometry(0.8, 0.2, 0.8);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x + (Math.random()-0.5)*2, 0.1, z + (Math.random()-0.5)*2);
            scene.add(mesh);
            particles.push({ mesh, velocity: new THREE.Vector3(0,0,0), life: 0.5, isWake: true });
        }

        function spawnFloatingText(text, x, z, color) {
            const el = document.createElement('div');
            el.className = 'dmg-text';
            el.innerText = text;
            el.style.color = color;
            document.getElementById('ui-layer').appendChild(el);
            floatingTexts.push({ element: el, pos: new THREE.Vector3(x, 2, z), life: 1.0 });
        }

        function fireCannons() {
            if (enemies.length === 0) return;

            // Find nearest enemy
            let nearest = null;
            let minDist = Infinity;
            for (const e of enemies) {
                const dist = PLAYER.mesh.position.distanceTo(e.mesh.position);
                if (dist < minDist && dist < 50) { // Range = 50
                    minDist = dist;
                    nearest = e;
                }
            }

            if (nearest) {
                for (let i = 0; i < PLAYER.cannons; i++) {
                    setTimeout(() => {
                        const cb = GAME.models.cannonball.clone();
                        // Spawn slightly elevated
                        cb.position.copy(PLAYER.mesh.position);
                        cb.position.y += 1.5;
                        scene.add(cb);

                        // Calculate velocity vector towards enemy
                        const targetPos = nearest.mesh.position.clone();
                        // Lead the target slightly based on dist
                        const dir = targetPos.sub(cb.position).normalize();
                        
                        // Add spread if multiple cannons
                        if (PLAYER.cannons > 1) {
                            dir.x += (Math.random() - 0.5) * 0.2;
                            dir.z += (Math.random() - 0.5) * 0.2;
                            dir.normalize();
                        }

                        projectiles.push({
                            mesh: cb,
                            velocity: dir.multiplyScalar(40), // Speed 40
                            life: 2.0 // dies after 2 seconds if miss
                        });
                        
                        // Recoil effect particle
                        createExplosion(PLAYER.mesh.position.x, PLAYER.mesh.position.z, 0xffaa00);
                        
                    }, i * 150); // staggered fire
                }
            }
        }

        // --- UPGRADE SYSTEM ---
        const UPGRADES =[
            { name: "Iron Hull", desc: "+20 Max HP & Full Heal", icon: "🛡️", apply: () => { PLAYER.maxHp += 20; PLAYER.hp = PLAYER.maxHp; } },
            { name: "Stolen Sails", desc: "+20% Movement Speed", icon: "⛵", apply: () => { PLAYER.speed *= 1.2; } },
            { name: "Extra Cannon", desc: "Fire an additional shot", icon: "💣", apply: () => { PLAYER.cannons += 1; } },
            { name: "Rapid Fire", desc: "Fire Rate +25%", icon: "⚡", apply: () => { PLAYER.fireRate *= 0.75; } },
            { name: "Heavy Iron", desc: "Damage +15", icon: "💥", apply: () => { PLAYER.damage += 15; } },
            { name: "Treasure Magnet", desc: "Loot pickup radius +50%", icon: "🧲", apply: () => { PLAYER.pickupRadius *= 1.5; } }
        ];

        function triggerLevelUp() {
            currentState = STATE.PAUSED;
            GAME.level++;
            GAME.xp -= GAME.nextXp;
            GAME.nextXp = Math.floor(GAME.nextXp * 1.5); // scaling
            updateHUD();

            const container = document.getElementById('upgrade-container');
            container.innerHTML = '';
            
            // Pick 3 random unique upgrades
            const shuffled = [...UPGRADES].sort(() => 0.5 - Math.random());
            const choices = shuffled.slice(0, 3);

            choices.forEach(choice => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-icon">${choice.icon}</div>
                    <h3>${choice.name}</h3>
                    <p>${choice.desc}</p>
                `;
                card.onclick = () => {
                    choice.apply();
                    updateHUD();
                    switchScreen('hud');
                    currentState = STATE.PLAYING;
                };
                container.appendChild(card);
            });

            switchScreen('screen-levelup');
        }


        // --- UPDATE LOOP ---
        function update(dt) {
            if (currentState !== STATE.PLAYING) return;

            GAME.time += dt;

            // Difficulty scaling (every minute gets harder)
            GAME.difficultyMultiplier = 1.0 + (GAME.time / 60) * 0.5;
            
            // --- PLAYER MOVEMENT ---
            const moveVec = new THREE.Vector3(0, 0, 0);
            if (keys.w || keys.ArrowUp) moveVec.z -= 1;
            if (keys.s || keys.ArrowDown) moveVec.z += 1;
            if (keys.a || keys.ArrowLeft) moveVec.x -= 1;
            if (keys.d || keys.ArrowRight) moveVec.x += 1;

            if (moveVec.lengthSq() > 0) {
                moveVec.normalize();
                
                // Rotate player towards movement
                const targetAngle = Math.atan2(moveVec.x, moveVec.z);
                // Smooth rotation using shortest path
                let diff = targetAngle - PLAYER.mesh.rotation.y;
                diff = Math.atan2(Math.sin(diff), Math.cos(diff)); 
                PLAYER.mesh.rotation.y += diff * PLAYER.turnSpeed * dt;

                // Move forward in facing direction
                const forward = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0,1,0), PLAYER.mesh.rotation.y);
                PLAYER.mesh.position.add(forward.multiplyScalar(PLAYER.speed * dt));

                // Wake particles
                if(Math.random() < 0.3) createWakeParticle(PLAYER.mesh.position.x, PLAYER.mesh.position.z);
            }

            // Bobbing animation
            PLAYER.mesh.position.y = Math.sin(GAME.time * 3) * 0.3;

            // Camera follow (Lerp)
            const targetCamPos = PLAYER.mesh.position.clone().add(cameraOffset);
            camera.position.lerp(targetCamPos, 5 * dt);

            // Ocean follows player snapping to grid
            ocean.position.x = Math.round(PLAYER.mesh.position.x / 10) * 10;
            ocean.position.z = Math.round(PLAYER.mesh.position.z / 10) * 10;

            // Animate Ocean Waves (Vertex Shader approximation)
            const posAttr = oceanGeo.attributes.position;
            const origZ = oceanGeo.userData.origZ;
            for(let i=0; i<posAttr.count; i++) {
                const px = ocean.position.x + posAttr.getX(i);
                const py = ocean.position.z + posAttr.getY(i); // Note: Y in 2D plane maps to world Z
                // Procedural wave formula
                const wave = Math.sin(px * 0.1 + GAME.time) * 0.8 + Math.cos(py * 0.1 + GAME.time * 1.2) * 0.8;
                posAttr.setZ(i, origZ[i] + wave);
            }
            posAttr.needsUpdate = true;
            oceanGeo.computeVertexNormals();

            // --- AUTO COMBAT ---
            PLAYER.fireTimer += dt;
            if (PLAYER.fireTimer >= PLAYER.fireRate) {
                fireCannons();
                PLAYER.fireTimer = 0;
            }

            // --- SPAWNER ---
            GAME.enemySpawnTimer -= dt;
            const currentSpawnRate = Math.max(0.2, (1.0 / GAME.enemySpawnRate) / GAME.difficultyMultiplier);
            if (GAME.enemySpawnTimer <= 0 && enemies.length < 150) { // Max 150 enemies for performance
                spawnEnemy();
                GAME.enemySpawnTimer = currentSpawnRate;
            }

            // --- ENEMIES ---
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                // Move towards player
                const dir = PLAYER.mesh.position.clone().sub(e.mesh.position);
                const dist = dir.length();
                
                if (dist > 1) {
                    dir.normalize();
                    e.mesh.position.add(dir.multiplyScalar(e.speed * dt));
                    // Look at player
                    e.mesh.rotation.y = Math.atan2(dir.x, dir.z);
                }

                // Bobbing
                e.yPhase += dt * 4;
                e.mesh.position.y = Math.sin(e.yPhase) * 0.4;

                // Collision with player
                if (dist < 3.0) {
                    PLAYER.hp -= e.damage;
                    createExplosion(PLAYER.mesh.position.x, PLAYER.mesh.position.z, 0xff0000);
                    spawnFloatingText(`-${e.damage}`, PLAYER.mesh.position.x, PLAYER.mesh.position.z, '#e74c3c');
                    updateHUD();
                    
                    // Push enemy back slightly
                    e.mesh.position.sub(dir.multiplyScalar(5));

                    if (PLAYER.hp <= 0) gameOver();
                }
            }

            // --- PROJECTILES ---
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
                // Add fake gravity arc visually
                p.mesh.position.y -= dt * 5; 
                if (p.mesh.position.y < 0) p.mesh.position.y = 0;

                p.life -= dt;
                
                // Collision check
                let hit = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (p.mesh.position.distanceTo(e.mesh.position) < 3.0) {
                        e.hp -= PLAYER.damage;
                        spawnFloatingText(PLAYER.damage.toString(), e.mesh.position.x, e.mesh.position.z, '#fff');
                        createExplosion(e.mesh.position.x, e.mesh.position.z, 0xffaa00);
                        
                        if (e.hp <= 0) {
                            spawnLoot(e.mesh.position.x, e.mesh.position.z, e.type === 'enemyMed' ? 20 : 10);
                            GAME.score += e.type === 'enemyMed' ? 50 : 15;
                            scene.remove(e.mesh);
                            enemies.splice(j, 1);
                        }
                        hit = true;
                        break;
                    }
                }

                if (hit || p.life <= 0 || p.mesh.position.y <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            // --- LOOT ---
            for (let i = loots.length - 1; i >= 0; i--) {
                const l = loots[i];
                l.timer += dt;
                // Bob and rotate
                l.mesh.rotation.y += dt;
                l.mesh.position.y = 0.5 + Math.sin(l.timer * 3) * 0.2;

                const dist = l.mesh.position.distanceTo(PLAYER.mesh.position);
                
                // Magnet effect if close
                if (dist < PLAYER.pickupRadius) {
                    const dir = PLAYER.mesh.position.clone().sub(l.mesh.position).normalize();
                    l.mesh.position.add(dir.multiplyScalar(20 * dt)); // Suck in quickly
                }

                if (dist < 2.0) {
                    GAME.xp += l.value;
                    scene.remove(l.mesh);
                    loots.splice(i, 1);
                    if (GAME.xp >= GAME.nextXp) triggerLevelUp();
                    updateHUD();
                }
            }

            // --- PARTICLES ---
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
                
                if(!p.isWake) {
                    p.mesh.rotation.x += dt * 5;
                    p.mesh.rotation.y += dt * 5;
                    p.mesh.scale.multiplyScalar(0.9); // shrink
                } else {
                    p.mesh.scale.multiplyScalar(0.95);
                    p.mesh.material.opacity = p.life * 2;
                }

                p.life -= dt;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            // --- FLOATING TEXT ---
            for(let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                ft.life -= dt;
                if(ft.life <= 0) {
                    ft.element.remove();
                    floatingTexts.splice(i, 1);
                } else {
                    // Update 2D position based on 3D world pos
                    const vector = ft.pos.clone().project(camera);
                    const x = (vector.x * .5 + .5) * window.innerWidth;
                    const y = (vector.y * -.5 + .5) * window.innerHeight;
                    ft.element.style.left = `${x}px`;
                    ft.element.style.top = `${y}px`;
                }
            }

            updateTimer();
        }

        // --- UI MANAGERS ---

        function switchScreen(id) {
            document.querySelectorAll('.screen, #hud').forEach(el => el.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        function updateHUD() {
            document.getElementById('hp-fill').style.width = `${Math.max(0, (PLAYER.hp / PLAYER.maxHp) * 100)}%`;
            document.getElementById('hp-text').innerText = `HP: ${Math.floor(PLAYER.hp)} / ${PLAYER.maxHp}`;
            document.getElementById('score-text').innerText = GAME.score;
            document.getElementById('xp-fill').style.width = `${Math.min(100, (GAME.xp / GAME.nextXp) * 100)}%`;
            document.getElementById('xp-text').innerText = `LVL ${GAME.level}`;
        }

        function updateTimer() {
            const mins = Math.floor(GAME.time / 60).toString().padStart(2, '0');
            const secs = Math.floor(GAME.time % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${secs}`;
        }

        function resetGame() {
            // Clean up entities
            [...enemies, ...projectiles, ...loots, ...particles].forEach(e => scene.remove(e.mesh));
            floatingTexts.forEach(f => f.element.remove());
            
            enemies =[]; projectiles = []; loots = []; particles = []; floatingTexts =[];

            // Reset States
            GAME.time = 0;
            GAME.score = 0;
            GAME.level = 1;
            GAME.xp = 0;
            GAME.nextXp = 100;
            GAME.difficultyMultiplier = 1.0;
            GAME.enemySpawnTimer = 0;

            PLAYER.hp = 100;
            PLAYER.maxHp = 100;
            PLAYER.speed = 15;
            PLAYER.fireRate = 1.0;
            PLAYER.damage = 25;
            PLAYER.cannons = 1;
            PLAYER.pickupRadius = 15;
            PLAYER.mesh.position.set(0,0,0);
            PLAYER.mesh.rotation.set(0,0,0);

            updateHUD();
            switchScreen('hud');
            currentState = STATE.PLAYING;
            GAME.lastFrameTime = performance.now();
        }

        function gameOver() {
            currentState = STATE.GAMEOVER;
            const mins = Math.floor(GAME.time / 60).toString().padStart(2, '0');
            const secs = Math.floor(GAME.time % 60).toString().padStart(2, '0');
            document.getElementById('final-stats').innerText = `Survived: ${mins}:${secs} | Score: ${GAME.score}`;
            switchScreen('screen-gameover');
        }

        // --- EVENT LISTENERS ---

        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });
        
        document.getElementById('btn-play').addEventListener('click', resetGame);
        document.getElementById('btn-restart').addEventListener('click', resetGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- RENDER LOOP ---
        function render(time) {
            requestAnimationFrame(render);
            
            const dt = Math.min((time - GAME.lastFrameTime) / 1000, 0.1); // Cap dt to prevent massive jumps
            GAME.lastFrameTime = time;

            if (currentState === STATE.PLAYING) {
                update(dt);
            }

            renderer.render(scene, camera);
        }

        // --- STARTUP ---
        initAssets().then(() => {
            GAME.lastFrameTime = performance.now();
            requestAnimationFrame(render);
        });

    </script>
</body>
</html>
